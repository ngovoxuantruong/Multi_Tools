# ══════════════════════════════════════════════════════════════════════════════
#  Docker Compose – Production
#
#  Usage (from project root):
#    Build & start:    docker compose -f docker-compose.prod.yml up --build
#    Start (no rebuild): docker compose -f docker-compose.prod.yml up
#    Restart:          docker compose -f docker-compose.prod.yml restart web
#    Stop + remove:    docker compose -f docker-compose.prod.yml down
#
#  Notes:
#    - HEALTHCHECK is inherited from the Dockerfile in apps/web/Dockerfile
#      (wget http://localhost:3000/ every 10 s, 3 retries).  No explicit
#      healthcheck block is needed here; Docker auto-detects it.
#    - Container runs as non-root user `nextjs` (uid 1001) for security.
#    - restart: unless-stopped survives host reboots and crash-restarts.
# ══════════════════════════════════════════════════════════════════════════════
version: "3.8"

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: multi-tools-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    # ── Health check (inherited from Dockerfile) ─────────────────────────────
    # Docker automatically picks up the HEALTHCHECK instruction from the
    # Dockerfile.  The explicit override below is optional but documents the
    # expected behaviour for anyone reading this file.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: "10s"
      timeout: "5s"
      retries: 3
      start_period: "10s"
