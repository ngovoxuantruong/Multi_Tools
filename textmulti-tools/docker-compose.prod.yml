# ══════════════════════════════════════════════════════════════════════════════
#  Docker Compose – Production
#
#  Usage (from project root):
#    Build & start:    docker compose -f docker-compose.prod.yml up --build
#    Start (no rebuild): docker compose -f docker-compose.prod.yml up
#    Restart:          docker compose -f docker-compose.prod.yml restart web
#    Stop + remove:    docker compose -f docker-compose.prod.yml down
#
#  Notes:
#    - HEALTHCHECK is inherited from the Dockerfile in apps/web/Dockerfile
#      (wget http://localhost:3000/ every 10 s, 3 retries).  Docker
#      auto-detects and applies it; no explicit healthcheck block is needed.
#    - Container runs as non-root user `nextjs` (uid 1001) for security.
#    - restart: unless-stopped survives host reboots and crash-restarts.
# ══════════════════════════════════════════════════════════════════════════════
version: "3.8"

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: multi-tools-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
